<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ice Out</title>
<style>
  body { margin:0; background:#0B1F2A; color:#f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
  .wrap { max-width:560px; }
  h1 { font-size:2.4rem; margin-bottom:8px; color:#7FDBFF; }
  p.tagline { font-size:1.1rem; opacity:0.85; margin-bottom:32px; }
  .feature { background:rgba(255,255,255,0.06); border-radius:14px; padding:20px; margin-bottom:12px; text-align:left; }
  a.footer-link { color:#7FDBFF; text-decoration:none; margin:0 10px; }
  footer { margin-top:40px; font-size:0.85rem; opacity:0.6; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #7FDBFF55 0%, #7FDBFF00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Ice Out</h1>
    <p class="tagline">Track the date your local lake or pond ices over and thaws each year.</p>
    <div class="feature"><strong>Free:</strong> Log freeze and thaw dates per year</div>
    <div class="feature"><strong>Pro:</strong> Multi-year trend chart and multiple-body-of-water tracking</div>
    <footer>
      <a class="footer-link" href="privacy.html">Privacy</a>
      <a class="footer-link" href="terms.html">Terms</a>
      <a class="footer-link" href="mailto:s0533495227@gmail.com">Contact</a>
    </footer>
  </div>
</body>
</html>
