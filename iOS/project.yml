name: IceOut
options:
  bundleIdPrefix: com.shimondeitel.iceout
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  IceOut:
    type: application
    platform: iOS
    sources:
      - path: IceOut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.iceout
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: IceOut/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  IceOutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IceOutTests
      - path: IceOut.storekit
    dependencies:
      - target: IceOut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.iceout.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  IceOutUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: IceOutUITests
    dependencies:
      - target: IceOut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.iceout.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  IceOut:
    build:
      targets:
        IceOut: all
        IceOutTests: [test]
        IceOutUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: IceOut.storekit
    test:
      config: Debug
      storeKitConfiguration: IceOut.storekit
      targets:
        - IceOutTests
        - IceOutUITests
    archive:
      config: Release
